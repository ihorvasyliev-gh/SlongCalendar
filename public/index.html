<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Susan Booking System</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#006bff',
              hover: '#0056cc',
              light: '#ebf3ff',
              dark: '#004db3',
            },
            slate: {
              950: '#0a2540',
            }
          }
        },
      },
    }
  </script>
  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      background-color: #f7f9fa; /* Clean light gray/blue background */
    }
    /* Custom scrollbar for slot list */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.99); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-slide-in {
      animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="text-gray-700 antialiased min-h-screen relative flex flex-col justify-between overflow-x-hidden">
  
  <div id="root" class="relative z-10 w-full max-w-5xl mx-auto px-4 py-8 flex-grow flex items-center justify-center">
    <!-- Server-Side Preloader / Skeleton -->
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary mx-auto mb-4"></div>
      <p class="text-gray-500 font-medium">Loading booking portal...</p>
    </div>
  </div>

  <footer class="relative z-10 w-full text-center py-6 border-t border-gray-200 text-gray-400 text-xs">
    <p>&copy; 2026 Susan Booking System. All rights reserved.</p>
  </footer>

  <!-- Load React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <!-- React Code using Babel -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- CONFIGURATION ---
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://127.0.0.1:8787'
      : 'https://susan-booking-bot.b1ackproff.workers.dev'; // Replace with your actual Worker URL
      
    const EVENT_CONFIG = {
      hostName: "Ihor Vasyliev",
      meetingName: "30 Minute Meeting",
      durationText: "1 hr",
      locationText: "dom",
      description: "Welcome! Please select an available date and time slot. Our appointment will be synced automatically, and a confirmation text will be sent to your chat thread."
    };
    // ---------------------

    function BookingApp() {
      const [token, setToken] = useState('');
      const [isValidatingToken, setIsValidatingToken] = useState(true);
      const [tokenData, setTokenData] = useState(null); // { valid: boolean, platform: string }
      
      const [currentScreen, setCurrentScreen] = useState('calendar'); // 'calendar', 'form', 'success'
      const [currentMonth, setCurrentMonth] = useState(() => {
        const d = new Date();
        d.setDate(1);
        return d;
      });
      const [selectedDate, setSelectedDate] = useState(''); // YYYY-MM-DD
      const [slots, setSlots] = useState([]);
      const [isLoadingSlots, setIsLoadingSlots] = useState(false);
      const [selectedSlotCandidate, setSelectedSlotCandidate] = useState(null); // { start: string, end: string }
      const [selectedSlot, setSelectedSlot] = useState(null); // { start: string, end: string }

      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [phone, setPhone] = useState('');
      const [guests, setGuests] = useState([]);
      const [showGuests, setShowGuests] = useState(false);
      const [notes, setNotes] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [bookingSuccess, setBookingSuccess] = useState(null);
      const [error, setError] = useState('');
      const [userTimezone, setUserTimezone] = useState('UTC');
      const [currentTimeStr, setCurrentTimeStr] = useState('');

      // Get token from URL parameters
      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token') || 'demo';
        setToken(urlToken);
        validateToken(urlToken);

        // Detect user timezone
        try {
          const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
          if (tz) setUserTimezone(tz);
        } catch (e) {
          console.error("Timezone detection failed", e);
        }
      }, []);

      // Update current time in detected timezone
      useEffect(() => {
        const updateTime = () => {
          try {
            const time = new Date().toLocaleTimeString('en-US', {
              timeZone: userTimezone,
              hour: '2-digit',
              minute: '2-digit',
              hour12: true
            }).toLowerCase();
            setCurrentTimeStr(time);
          } catch (e) {
            const time = new Date().toLocaleTimeString('en-US', {
              hour: '2-digit',
              minute: '2-digit',
              hour12: true
            }).toLowerCase();
            setCurrentTimeStr(time);
          }
        };
        updateTime();
        const timer = setInterval(updateTime, 60000);
        return () => clearInterval(timer);
      }, [userTimezone]);

      // Fetch slots when selectedDate or token changes
      useEffect(() => {
        if (token && selectedDate && tokenData && tokenData.valid) {
          fetchSlots(selectedDate);
        }
      }, [selectedDate, tokenData]);

      const validateToken = async (tokenStr) => {
        if (tokenStr === 'demo') {
          setTokenData({ valid: true, platform: 'instagram' });
          setIsValidatingToken(false);
          return;
        }
        try {
          const res = await fetch(`${API_BASE_URL}/api/validate-token?token=${encodeURIComponent(tokenStr)}`);
          if (res.ok) {
            const data = await res.json();
            setTokenData(data);
          } else {
            setTokenData({ valid: false });
          }
        } catch (err) {
          console.error(err);
          setTokenData({ valid: false });
        } finally {
          setIsValidatingToken(false);
        }
      };

      const fetchSlots = async (dateStr) => {
        setIsLoadingSlots(true);
        setSelectedSlotCandidate(null);
        setError('');
        if (token === 'demo') {
          setTimeout(() => {
            const mockSlots = [
              { start: `${dateStr}T09:00:00.000Z`, end: `${dateStr}T10:00:00.000Z` },
              { start: `${dateStr}T09:30:00.000Z`, end: `${dateStr}T10:30:00.000Z` },
              { start: `${dateStr}T10:00:00.000Z`, end: `${dateStr}T11:00:00.000Z` },
              { start: `${dateStr}T10:30:00.000Z`, end: `${dateStr}T11:30:00.000Z` },
              { start: `${dateStr}T11:00:00.000Z`, end: `${dateStr}T12:00:00.000Z` },
              { start: `${dateStr}T11:30:00.000Z`, end: `${dateStr}T12:30:00.000Z` },
              { start: `${dateStr}T12:00:00.000Z`, end: `${dateStr}T13:00:00.000Z` },
              { start: `${dateStr}T12:30:00.000Z`, end: `${dateStr}T13:30:00.000Z` },
              { start: `${dateStr}T13:00:00.000Z`, end: `${dateStr}T14:00:00.000Z` },
              { start: `${dateStr}T13:30:00.000Z`, end: `${dateStr}T14:30:00.000Z` }
            ];
            setSlots(mockSlots);
            setIsLoadingSlots(false);
          }, 400);
          return;
        }
        try {
          const res = await fetch(`${API_BASE_URL}/api/available-slots?token=${encodeURIComponent(token)}&date=${dateStr}`);
          if (res.ok) {
            const data = await res.json();
            setSlots(data.slots || []);
          } else {
            const errData = await res.json();
            setError(errData.error || 'Failed to fetch slots.');
          }
        } catch (err) {
          setError('Could not connect to the booking server.');
        } finally {
          setIsLoadingSlots(false);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!selectedSlot) return;

        setIsSubmitting(true);
        setError('');

        const finalGuests = showGuests ? guests.filter(g => g.trim() !== '') : [];

        if (token === 'demo') {
          setTimeout(() => {
            setBookingSuccess({
              client_name: name,
              client_email: email,
              start_time: selectedSlot.start,
              end_time: selectedSlot.end
            });
            setCurrentScreen('success');
            setIsSubmitting(false);
          }, 800);
          return;
        }

        try {
          const res = await fetch(`${API_BASE_URL}/api/book`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              token,
              name,
              email,
              phone,
              slotStart: selectedSlot.start,
              notes,
              guests: finalGuests
            })
          });

          const data = await res.json();

          if (res.ok) {
            setBookingSuccess(data.appointment);
            setCurrentScreen('success');
          } else {
            setError(data.error || 'Booking failed. The slot may have been taken.');
          }
        } catch (err) {
          setError('Network error occurred during booking. Please try again.');
        } finally {
          setIsSubmitting(false);
        }
      };

      const handleAddGuestField = () => {
        setGuests([...guests, '']);
      };

      const handleGuestEmailChange = (index, value) => {
        const newGuests = [...guests];
        newGuests[index] = value;
        setGuests(newGuests);
      };

      const handleRemoveGuestField = (index) => {
        const newGuests = guests.filter((_, i) => i !== index);
        setGuests(newGuests);
        if (newGuests.length === 0) {
          setShowGuests(false);
        }
      };

      const formatTimeLocal = (isoString) => {
        const date = new Date(isoString);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase();
      };

      const formatDateLocal = (isoString) => {
        const date = new Date(isoString);
        return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      };

      const formatSlotRange = (slot) => {
        if (!slot) return '';
        const start = new Date(slot.start);
        const end = new Date(slot.end);
        const timeStr = `${start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase()} - ${end.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }).toLowerCase()}`;
        const dateStr = start.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        return `${timeStr}, ${dateStr}`;
      };

      const getFriendlyTzName = (tz) => {
        if (!tz) return 'UTC';
        if (tz === 'Europe/London' || tz === 'Europe/Dublin' || tz === 'Europe/Lisbon' || tz === 'Europe/Belfast') {
          return 'UK, Ireland, Lisbon Time';
        }
        const parts = tz.split('/');
        return parts[parts.length - 1].replace(/_/g, ' ') + ' Time';
      };

      // --- CALENDAR LOGIC ---
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const isDateAvailable = (date) => {
        if (!date) return false;
        if (date.getDay() === 0) return false; // Skip Sunday

        const limitDate = new Date();
        limitDate.setDate(today.getDate() + 30);
        limitDate.setHours(23, 59, 59, 999);

        return date >= today && date <= limitDate;
      };

      const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      // Weekdays starting from Mon to match Calendly screenshots
      const weekdays = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const firstDayOfWeek = firstDay.getDay(); // 0 is Sunday, 1 is Monday, etc.
      const firstDayIndexMapped = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;

      const totalDays = new Date(year, month + 1, 0).getDate();

      const calendarCells = [];
      for (let i = 0; i < firstDayIndexMapped; i++) {
        calendarCells.push(null);
      }
      for (let d = 1; d <= totalDays; d++) {
        calendarCells.push(new Date(year, month, d));
      }

      const handlePrevMonth = () => {
        setCurrentMonth(prev => new Date(prev.getFullYear(), prev.getMonth() - 1, 1));
      };

      const handleNextMonth = () => {
        setCurrentMonth(prev => new Date(prev.getFullYear(), prev.getMonth() + 1, 1));
      };

      const isPrevMonthDisabled = year <= today.getFullYear() && month <= today.getMonth();
      
      const horizonLimit = new Date();
      horizonLimit.setDate(today.getDate() + 30);
      const isNextMonthDisabled = year >= horizonLimit.getFullYear() && month >= horizonLimit.getMonth();

      // --- RENDER STATES ---

      if (isValidatingToken) {
        return (
          <div className="text-center py-12">
            <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary mx-auto mb-4"></div>
            <p className="text-gray-500 font-medium">Validating secure token...</p>
          </div>
        );
      }

      if (!tokenData || !tokenData.valid) {
        return (
          <div className="bg-white rounded-lg p-8 max-w-md w-full text-center shadow-md border border-red-100 animate-fade-in mx-4">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 text-red-500 mb-6">
              <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <h2 className="text-2xl font-bold text-gray-800 mb-3">Expired or Invalid Token</h2>
            <p className="text-gray-500 text-sm leading-relaxed mb-6">
              This link is either expired (tokens last 24 hours), already used, or invalid. Please send a new message in our chat to get a fresh booking link.
            </p>
          </div>
        );
      }

      // Check if slot details are active
      const isSlotsView = currentScreen === 'calendar' && selectedDate !== '';
      const hideSidebarOnMobile = currentScreen !== 'calendar' || selectedDate !== '';

      return (
        <div className="bg-white w-full max-w-5xl md:my-8 md:rounded-lg md:shadow-[0_1px_8px_rgba(0,0,0,0.08)] md:border border-gray-200 overflow-hidden relative animate-fade-in flex flex-col min-h-[620px]">

          {/* MAIN DUAL COLUMNS GRID */}
          <div className="grid grid-cols-1 lg:grid-cols-12 flex-grow">
            
            {/* LEFT COLUMN: Host & Event Info */}
            {/* On mobile, this column is shown on Screen 1 (Calendar day-not-selected) but hidden on Screen 2 (Slots picker) and Screen 3 (Form) */}
            <div className={`lg:col-span-4 p-5 md:p-8 border-b lg:border-b-0 lg:border-r border-gray-150 flex flex-col bg-white ${
              hideSidebarOnMobile ? 'hidden lg:flex' : 'flex'
            }`}>
              
              {/* Logo / Initials (Circle icon) */}
              <div className="relative mb-3 md:mb-5 flex justify-center lg:justify-start">
                <div className="w-12 h-12 md:w-14 md:h-14 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center text-gray-400 font-extrabold text-lg md:text-xl shadow-inner">
                  {EVENT_CONFIG.hostName.charAt(0)}
                </div>
              </div>

              {/* Host and Meeting Title */}
              <div className="text-center lg:text-left mb-4 md:mb-6">
                <p className="text-gray-500 text-xs font-bold tracking-wider uppercase">{EVENT_CONFIG.hostName}</p>
                <h1 className="text-xl md:text-2xl font-bold text-slate-950 mt-1">{EVENT_CONFIG.meetingName}</h1>
              </div>

              {/* Event Metadata (Icons list) */}
              <div className="space-y-2.5 md:space-y-4 text-[14px] text-gray-500 flex flex-col items-center lg:items-start font-semibold mb-4 md:mb-6">
                <div className="flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-gray-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  <span>{EVENT_CONFIG.durationText}</span>
                </div>
                <div className="flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-gray-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span>{EVENT_CONFIG.locationText}</span>
                </div>
                {/* Dynamically display platform detail */}
                <div className="flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-gray-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                  <span className="capitalize">{tokenData.platform === 'instagram' ? 'Instagram Direct' : 'Facebook Messenger'}</span>
                </div>
              </div>

              {/* Left sidebar selected slot timing display (only shown on Form & Success screen on Desktop) */}
              {(currentScreen === 'form' || currentScreen === 'success') && selectedSlot && (
                <div className="mt-2 pt-6 border-t border-gray-150 animate-fade-in text-left">
                  <div className="flex items-start text-gray-600 font-semibold space-x-3 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-gray-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <div className="space-y-0.5">
                      <p className="text-primary font-bold text-xs uppercase tracking-wider">Date & Time</p>
                      <p className="text-gray-800 text-[14px] leading-snug">{formatTimeLocal(selectedSlot.start)} - {formatTimeLocal(selectedSlot.end)}</p>
                      <p className="text-gray-800 text-[14px] leading-snug">{new Date(selectedSlot.start).toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</p>
                      <p className="text-gray-400 text-xs mt-1 font-medium">{getFriendlyTzName(userTimezone)}</p>
                    </div>
                  </div>
                </div>
              )}

              {/* Sidebar Help description */}
              {currentScreen === 'calendar' && (
                <p className="text-gray-400 text-[13px] leading-relaxed text-center lg:text-left mt-auto pt-6 border-t border-gray-100 hidden lg:block">
                  {EVENT_CONFIG.description}
                </p>
              )}
            </div>

            {/* RIGHT COLUMN: Interactive Work Area */}
            <div className="lg:col-span-8 p-6 md:p-8 flex flex-col justify-center bg-white">

              {/* SCREEN 1: CALENDAR & SLOTS CONTAINER */}
              {currentScreen === 'calendar' && (
                <div className="space-y-4">
                  
                  {/* Outer grid for Calendar or Calendar + Slots side-by-side on desktop */}
                  <div className={`grid grid-cols-1 ${selectedDate ? 'lg:grid-cols-12 gap-8' : 'max-w-md mx-auto w-full'} items-start`}>
                    
                    {/* Calendar Day Picker (Spans 7 cols if date selected, otherwise full width) */}
                    <div className={`${selectedDate ? 'hidden lg:block lg:col-span-7' : 'lg:col-span-12'}`}>
                      
                      <h2 className="text-xl font-bold text-slate-950 mb-6 text-center font-sans">Select a Day</h2>

                      {/* Month Swiper */}
                      <div className="flex items-center justify-center space-x-6 mb-5">
                        <button
                          disabled={isPrevMonthDisabled}
                          onClick={handlePrevMonth}
                          className="p-2 rounded-full text-primary hover:bg-primary-light disabled:opacity-20 disabled:cursor-not-allowed transition duration-150"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <span className="text-[15px] font-bold text-slate-950 uppercase tracking-wide min-w-[130px] text-center">
                          {monthNames[month]} {year}
                        </span>
                        <button
                          disabled={isNextMonthDisabled}
                          onClick={handleNextMonth}
                          className="p-2 rounded-full text-primary hover:bg-primary-light disabled:opacity-20 disabled:cursor-not-allowed transition duration-150"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                      </div>

                      {/* Weekday Names Header */}
                      <div className="grid grid-cols-7 gap-y-2 text-center text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">
                        {weekdays.map(day => (
                          <div key={day} className="h-6 flex items-center justify-center">{day}</div>
                        ))}
                      </div>

                      {/* Days Grid */}
                      <div className="grid grid-cols-7 gap-y-3.5 gap-x-2 text-center text-sm font-semibold">
                        {calendarCells.map((date, idx) => {
                          if (!date) {
                            return <div key={`empty-${idx}`} className="h-9 w-9 sm:h-10 sm:w-10"></div>;
                          }
                          const isAvailable = isDateAvailable(date);
                          const dateStr = date.toISOString().split('T')[0];
                          const isSelected = selectedDate === dateStr;
                          const isToday = date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();

                          return (
                            <button
                              key={dateStr}
                              disabled={!isAvailable}
                              onClick={() => setSelectedDate(dateStr)}
                              className={`h-9 w-9 sm:h-10 sm:w-10 mx-auto rounded-full flex items-center justify-center transition-all relative ${
                                isSelected
                                  ? 'bg-primary text-white font-bold shadow-sm scale-105'
                                  : isAvailable
                                    ? 'bg-primary-light text-primary font-bold hover:bg-primary hover:text-white'
                                    : 'text-gray-300 cursor-not-allowed'
                              }`}
                            >
                              <span className="mb-0.5">{date.getDate()}</span>
                              {isToday && (
                                <span className={`absolute bottom-1 w-1 h-1 rounded-full ${
                                  isSelected ? 'bg-white' : 'bg-primary'
                                }`}></span>
                              )}
                            </button>
                          );
                        })}
                      </div>

                      {/* Timezone picker details at the bottom of the calendar */}
                      <div className="mt-8 flex items-center justify-center text-xs text-gray-500 pt-5 border-t border-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 mr-2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        <span className="font-semibold text-gray-600">
                          {getFriendlyTzName(userTimezone)} {currentTimeStr && `(${currentTimeStr})`}
                        </span>
                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5 ml-1 text-gray-400 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                      </div>

                    </div>

                    {/* Vertical Time Slots Selector Panel (On mobile, this is shown exclusively if day selected) */}
                    {selectedDate && (
                      <div className="lg:col-span-5 space-y-4 animate-slide-in flex flex-col">
                        
                        {/* Mobile Back and Header elements */}
                        <div className="flex items-center justify-between pb-2 border-b border-gray-100 lg:border-none lg:pb-0">
                          <button
                            onClick={() => {
                              setSelectedDate('');
                              setSelectedSlotCandidate(null);
                            }}
                            className="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 text-primary transition shadow-sm"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                          </button>
                          
                          <div className="text-right lg:hidden">
                            <p className="text-xs font-bold text-gray-400 uppercase tracking-wider">Date Selected</p>
                            <p className="text-sm font-bold text-slate-950">
                              {new Date(selectedDate).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}
                            </p>
                          </div>
                        </div>

                        {/* Title of the slots section (desktop) */}
                        <p className="text-sm font-bold text-gray-500 capitalize hidden lg:block">
                          {new Date(selectedDate).toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' })}
                        </p>

                        <div className="space-y-1">
                          <h3 className="text-lg font-extrabold text-slate-950">Select a Time</h3>
                          <p className="text-xs font-bold text-gray-400">Duration: {EVENT_CONFIG.durationText}</p>
                        </div>

                        {/* Slots scrollable area */}
                        {isLoadingSlots ? (
                          <div className="space-y-3 pt-2">
                            {[1, 2, 3, 4, 5].map(i => (
                              <div key={i} className="h-12 bg-gray-100 animate-pulse rounded-lg border border-gray-200"></div>
                            ))}
                          </div>
                        ) : slots.length > 0 ? (
                          <div className="space-y-2.5 max-h-[60vh] lg:max-h-[480px] overflow-y-auto pr-1.5 custom-scrollbar pt-2">
                            {slots.map((slot) => {
                              const isCandidate = selectedSlotCandidate && selectedSlotCandidate.start === slot.start;
                              return (
                                <div key={slot.start} className="flex gap-3 transition-all duration-200">
                                  <button
                                    onClick={() => setSelectedSlotCandidate(slot)}
                                    className={`flex-grow py-2.5 px-4 rounded border text-sm font-bold transition-all duration-200 flex items-center justify-center ${
                                      isCandidate
                                        ? 'bg-[#5c6670] border-[#5c6670] text-white w-1/2'
                                        : 'border-primary text-primary bg-white hover:border-[2.5px] hover:bg-primary-light w-full'
                                    }`}
                                  >
                                    {formatTimeLocal(slot.start)}
                                  </button>
                                  
                                  {isCandidate && (
                                    <button
                                      onClick={() => {
                                        setSelectedSlot(slot);
                                        setCurrentScreen('form');
                                      }}
                                      className="w-1/2 py-2.5 px-4 rounded bg-primary border border-primary text-white font-bold text-sm hover:bg-primary-hover transition-all duration-200 shadow-sm animate-fade-in"
                                    >
                                      Next
                                    </button>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="text-center py-10 bg-gray-50 border border-gray-100 rounded-lg flex flex-col items-center justify-center space-y-2 pt-8">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="10" y1="14" x2="14" y2="18"/><line x1="14" y1="14" x2="10" y2="18"/></svg>
                            <p className="text-sm text-gray-500 font-bold">No slots available today</p>
                            <p className="text-xs text-gray-400">Please choose another calendar date.</p>
                          </div>
                        )}
                      </div>
                    )}

                  </div>

                  {error && (
                    <div className="p-4 rounded-lg bg-red-50 border border-red-100 text-red-600 text-sm flex items-start mt-4 max-w-lg mx-auto">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                      <span>{error}</span>
                    </div>
                  )}



                </div>
              )}

              {/* SCREEN 2: DETAILS FORM */}
              {currentScreen === 'form' && (
                <div className="space-y-4 max-w-md mx-auto w-full animate-slide-in">

                  {/* Host info details shown above form ONLY on mobile */}
                  <div className="space-y-1 lg:hidden border-b border-gray-150 pb-2.5">
                    <div className="flex flex-wrap items-center gap-x-2 gap-y-0.5 font-bold text-xs text-gray-500">
                      <span className="text-slate-950 font-extrabold text-sm">{EVENT_CONFIG.meetingName}</span>
                      <span>•</span>
                      <span>{EVENT_CONFIG.durationText}</span>
                      <span>•</span>
                      <span>{EVENT_CONFIG.locationText}</span>
                    </div>
                    {selectedSlot && (
                      <div className="text-xs font-semibold text-gray-600 flex items-center space-x-1">
                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <span>{formatTimeLocal(selectedSlot.start)} - {formatTimeLocal(selectedSlot.end)}, {new Date(selectedSlot.start).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                      </div>
                    )}
                  </div>

                  {/* Back button and title aligned inline */}
                  <div className="flex items-center space-x-3">
                    <button
                      type="button"
                      onClick={() => {
                        setCurrentScreen('calendar');
                        setSelectedSlot(null);
                      }}
                      className="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 text-primary transition shadow-sm flex-shrink-0"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    </button>
                    <h2 className="text-xl font-bold text-slate-950 font-sans">Enter Details</h2>
                  </div>

                  <form onSubmit={handleSubmit} className="space-y-3">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Name *</label>
                      <input
                        type="text"
                        required
                        placeholder="Name"
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        className="w-full border border-gray-300 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-2 text-sm text-gray-800 outline-none transition"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Email *</label>
                      <input
                        type="email"
                        required
                        placeholder="Email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        className="w-full border border-gray-300 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-2 text-sm text-gray-800 outline-none transition"
                      />
                    </div>

                    {/* Add Guests Feature */}
                    <div>
                      {showGuests ? (
                        <div className="space-y-2 mt-2">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Guest Emails</label>
                          {guests.map((guestEmail, index) => (
                            <div key={index} className="flex items-center space-x-2 animate-fade-in">
                              <input
                                type="email"
                                placeholder={`guest-${index + 1}@example.com`}
                                value={guestEmail}
                                onChange={(e) => handleGuestEmailChange(index, e.target.value)}
                                className="flex-grow border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-800 outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                              />
                              <button
                                type="button"
                                onClick={() => handleRemoveGuestField(index)}
                                className="p-2.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition"
                                title="Remove guest"
                              >
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                              </button>
                            </div>
                          ))}
                          {guests.length < 10 && (
                            <button
                              type="button"
                              onClick={handleAddGuestField}
                              className="text-xs font-bold text-primary hover:text-primary-hover flex items-center space-x-1.5 py-1"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                              <span>Add another guest</span>
                            </button>
                          )}
                        </div>
                      ) : (
                        <button
                          type="button"
                          onClick={() => {
                            setShowGuests(true);
                            setGuests(['']);
                          }}
                          className="inline-flex items-center space-x-1.5 border border-primary text-primary font-bold text-xs rounded-full px-4 py-2 hover:bg-primary-light transition"
                        >
                          <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
                          <span>Add guests</span>
                        </button>
                      )}
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Phone Number (Optional)</label>
                      <input
                        type="tel"
                        placeholder="Phone Number"
                        value={phone}
                        onChange={(e) => setPhone(e.target.value)}
                        className="w-full border border-gray-300 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-2 text-sm text-gray-800 outline-none transition"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Please share anything that will help prepare for our meeting.</label>
                      <textarea
                        rows="2"
                        placeholder="Share details here..."
                        value={notes}
                        onChange={(e) => setNotes(e.target.value)}
                        className="w-full border border-gray-300 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-2 text-sm text-gray-800 outline-none transition resize-none"
                      />
                    </div>

                    {error && (
                      <div className="p-2.5 rounded-lg bg-red-50 border border-red-100 text-red-600 text-xs flex items-start">
                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 mr-2.5 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <span>{error}</span>
                      </div>
                    )}


                    <button
                      type="submit"
                      disabled={isSubmitting}
                      className="w-full mt-1.5 py-3 rounded bg-primary text-white font-bold text-sm hover:bg-primary-hover transition duration-150 flex items-center justify-center space-x-2 shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
                    >
                      {isSubmitting ? (
                        <React.Fragment>
                          <div className="animate-spin rounded-full h-4 w-4 border-t-2 border-b-2 border-white"></div>
                          <span>Scheduling...</span>
                        </React.Fragment>
                      ) : (
                        <span>Schedule Event</span>
                      )}
                    </button>
                  </form>



                </div>
              )}

              {/* SCREEN 3: SUCCESS SCREEN */}
              {currentScreen === 'success' && bookingSuccess && (
                <div className="space-y-6 text-center max-w-md mx-auto w-full animate-fade-in py-8">
                  
                  {/* Confirmed checkmark */}
                  <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-50 text-emerald-500 mb-2 border border-emerald-100 animate-bounce">
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  
                  <h2 className="text-2xl font-bold text-slate-950 font-sans">Booking Confirmed!</h2>
                  <p className="text-gray-500 text-sm">Your appointment is scheduled and synced with our calendar.</p>
                  
                  {/* Summary details card */}
                  <div className="bg-gray-50 rounded-lg p-5 border border-gray-150 text-left space-y-4 text-sm font-semibold">
                    <div className="flex items-start">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-gray-400 mr-3 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                      <div>
                        <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-0.5">Invitee</p>
                        <p className="text-gray-800 font-bold">{bookingSuccess.client_name}</p>
                        <p className="text-gray-500 text-xs mt-0.5">{bookingSuccess.client_email}</p>
                      </div>
                    </div>
                    
                    <div className="flex items-start">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4 text-gray-400 mr-3 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      <div>
                        <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-0.5">Date & Time</p>
                        <p className="text-gray-800 font-bold">{formatDateLocal(bookingSuccess.start_time)}</p>
                        <p className="text-gray-500 text-xs mt-0.5">{formatTimeLocal(bookingSuccess.start_time)} - {formatTimeLocal(bookingSuccess.end_time)}</p>
                      </div>
                    </div>
                  </div>

                  <p className="text-xs text-gray-400 leading-relaxed max-w-sm mx-auto">
                    A confirmation message has been sent back to your {tokenData.platform === 'instagram' ? 'Instagram' : 'Facebook Messenger'} thread. You can safely close this browser window.
                  </p>
                </div>
              )}

            </div>

          </div>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<BookingApp />);
  </script>
</body>
</html>
